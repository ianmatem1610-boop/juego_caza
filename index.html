<!DOCTYPE html>
<html>
<head>
  <title>Juego Cazando</title>

  <!-- CSS -->
  <link rel="stylesheet" href="cazando.css">

  <!-- Fuente gamer -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body onload="iniciarJuego()">

  <div class="container">

    <h1>🏹 JUEGO CAZANDO</h1>
    <p class="autor">Ian Mera (IanDev)</p>

    <!-- PANEL -->
    <div class="panel">
      <div class="stat">🎯 Puntos: <span id="puntos">0</span></div>
      <div class="stat">⏱ Tiempo: <span id="tiempo">10</span></div>
    </div>

    <!-- JUEGO -->
    <canvas id="areaJuego" width="500" height="500"></canvas>

    <!-- CONTROLES -->
    <div class="controles">
      <button onclick="moverArriba()">⬆</button>
      <div>
        <button onclick="moverIzquierda()">⬅</button>
        <button onclick="moverAbajo()">⬇</button>
        <button onclick="moverDerecha()">➡</button>
      </div>
    </div>

    <!-- BOTÓN -->
    <button class="btn-reiniciar" onclick="reiniciarJuego()">
      🔄 REINICIAR
    </button>

    <!-- MENSAJE -->
    <p id="mensaje"></p>

  </div>

  <script src="cazando.js"></script>
  <script src="utilitarios.js"></script>

</body>
</html>
